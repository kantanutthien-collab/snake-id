<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Snake·ID — Home</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #0A0418;
    font-family: 'Geist', system-ui, sans-serif;
    color: #F1EBFF;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 24px 12px; box-sizing: border-box;
    background:
      radial-gradient(60% 50% at 50% 25%, #2B1456 0%, #150829 55%, #060211 100%);
    min-height: 100vh;
  }
  /* scanning animations */
  @keyframes sid-scan-slow {
    0%   { top: 6%;  opacity: 0.0; }
    8%   { opacity: 0.8; }
    50%  { top: 94%; opacity: 0.6; }
    92%  { opacity: 0.8; }
    100% { top: 6%;  opacity: 0.0; }
  }
  @keyframes sid-scan-fast {
    0%   { top: 8%;  }
    50%  { top: 92%; }
    100% { top: 8%;  }
  }
  @keyframes sid-rise {
    from { transform: translateY(60%); opacity: 0.0; }
    to   { transform: translateY(0);   opacity: 1.0; }
  }
  @keyframes sid-fade-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  button:active { transform: translateY(1px); }
  button:focus-visible { outline: 2px solid #4A2B7A; outline-offset: 2px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="snake-data.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "ctaLabel": "Scan now",
  "city": "Bangkok",
  "previewResult": "auto"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <IOSDevice width={402} height={874} dark={true}>
        <HomeScreen tweaks={tweaks} setTweak={setTweak}/>
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Primary action">
          <TweakRadio
            label="Button label"
            value={tweaks.ctaLabel}
            onChange={v => setTweak('ctaLabel', v)}
            options={[
              { value: 'Identify',  label: 'Identify' },
              { value: 'Snap',      label: 'Snap' },
              { value: 'Scan now',  label: 'Scan now' },
            ]}
          />
        </TweakSection>

        <TweakSection label="Demo result">
          <TweakSelect
            label="What the scanner ‘sees’"
            value={tweaks.previewResult}
            onChange={v => setTweak('previewResult', v)}
            options={[
              { value: 'auto',      label: 'Auto · pit viper (default)' },
              { value: 'pit-viper', label: '🐍 White-lipped Pit Viper (danger 4)' },
              { value: 'krait',     label: '🐍 Malayan Krait (deadly)' },
              { value: 'racer',     label: '🐍 Red-tailed Racer (non-venomous)' },
              { value: 'dog',       label: '🐕 Dog (other animal)' },
              { value: 'human',     label: '👤 Human (other animal)' },
            ]}
          />
          <div style={{
            marginTop: 6, fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
            color: '#7E847C', lineHeight: 1.4,
          }}>
            Snakes get a full profile · other species get a name only.
          </div>
        </TweakSection>

        <TweakSection label="Location">
          <TweakText
            label="City shown in top bar"
            value={tweaks.city}
            onChange={v => setTweak('city', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
